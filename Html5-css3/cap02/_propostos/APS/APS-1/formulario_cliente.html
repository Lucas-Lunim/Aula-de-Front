<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
</head>
<body>
    <h1>Informações Pessoais</h1>
    <form action="menu.html">
        <fieldset>
            <legend>Cadastro de Cliente</legend><br>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome" placeholder="Digite o nome do cliente" size="50">
            </div>
            <br>
            <div>
                <label for="idade">Idade:</label>
                <input type="text" name="idade" id="idade" placeholder="Digite a idade" size="10">
            </div>
            <br>
            <div>
                <label for="endereco">Endereço:</label><br>
                <input type="text" name="endereco" id="endereco" placeholder="Digite o endereço" size="80">
            </div>
            <br>
            <div>
                <label for="cidade">Cidade:</label>
                <input type="text" name="cidade" id="cidade" placeholder="Digite a cidade" size="50">
            </div>
            <br>
            <div>
                <label for="estado">Estado:</label>
                <input type="text" name="estado" id="estado" placeholder="UF" size="1">
            </div>
            <br>
            <div>
                <label for="cep">CEP:</label>
                <input type="text" name="cep" id="cep" placeholder="XXXXX-XXX" size="10">
            </div>
            <br>
            <div>
                <label for="telres">Tel/Res:</label>
                <input type="tel" name="telres" id="telres" placeholder="99 99999-9999" size="12">
            </div>
            <br>
            <div>
                <label for="telcel">Tel/Cel:</label>
                <input type="tel" name="telcel" id="telcel" placeholder="99 99999-9999" size="12">
            </div>
            <br>
            <div>
                <label for="email">Email:</label><br>
                <input type="email" name="email" id="email" placeholder="Digite o endereço de email" size="80">
            </div>
            <br>

            
        </fieldset>
        <input type="submit" value="Enviar">
    </form>
    
</body>
</html>
