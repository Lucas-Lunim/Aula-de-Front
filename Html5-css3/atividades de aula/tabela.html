<fieldset>
    <legend>Endereço</legend>
    <div>
        <label for="endereço">Endereço</label>
        <input type="text" name="endereço" id="endereço">
    </div>
    <br>
    <div>
        <label for="numero">Nº</label>
        <input type="" name="numero" id="numero">
    </div>
</fieldset>
<form action="curiosidades.html">

    <fieldset>
        <fieldset>
            <legend>Dados pessoais</legend>
            <br>
            <div>
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" size="20" placeholder="João">
            </div>
            <br>
            <div>
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" size="20"
                placeholder="João@gmail.com">
            </div>
            <br>

            <label for="tel">Celular</label>
            <input type="tel" name="tel" id="tel" placeholder="(99) 9-99999-9999" size="20">
        </fieldset>
        <legend>Outros</legend>
        <br>
        <div>
            <label for="sexo">Sexo</label><br>
            
            <input type="radio" name="sexo" id="Masculino">
            <label for="">Masculino</label>
            <br>

            <input type="radio" name="sexo" id="Feminino">
            <label for="">Feminino</label>
            <br>

            <input type="radio" name="sexo" id="Outros">
            <label for="">Outros</label>
            <br><br>



            <label for="dias">Dias da semana: </label><br>

            <input type="checkbox" name="seg" id="seg">
            <label for="">segunda</label>

            <input type="checkbox" name="ter" id="ter">
            <label for="">terça</label>

            <input type="checkbox" name="quar" id="quar">
            <label for="">quarta</label>

            <input type="checkbox" name="quin" id="quin">
            <label for="">quinta</label>

            <input type="checkbox" name="sext" id="sext">
            <label for="">sexta</label>
            <br>
            <br>
            <label for="">Selecione: </label>

            <select name="" id="">
                <option value="">Selecione...</option>
                <option value="">Opção 1</option>
                <option value="">Opção 2</option>
                <option value="">Opção 3</option>
            </select>
            <br>
        </div>
        <br>
        
            <input type="submit" value="Enviar">
        
    </fieldset>
</form>
